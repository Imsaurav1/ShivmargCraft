<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create a Mithila Crafts account to shop authentic Madhubani art and track your orders.">
  <title>Register - Mithila Crafts</title>
  <link rel="icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">
        <img src="logo192.png" alt="Mithila Crafts">
        Mithila Crafts
      </a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Shop</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="cart.html" class="nav-cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="cart-badge" style="display:none">0</span>
        </a>
        <span class="auth-nav-links"></span>
      </div>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Register Form -->
  <section class="auth-page">
    <div class="container">
      <div class="auth-card">
        <div class="auth-header">
          <h1>Create Account</h1>
          <p>Join Mithila Crafts to shop authentic handmade art</p>
        </div>
        <div id="auth-message" class="form-message"></div>
        <form id="register-form">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" required placeholder="Your full name" autocomplete="name">
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required placeholder="your@email.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label for="phone">Phone Number (optional)</label>
            <input type="tel" id="phone" placeholder="+91 12345 67890" autocomplete="tel">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="Min. 6 characters" autocomplete="new-password" minlength="6">
          </div>
          <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" required placeholder="Re-enter password" autocomplete="new-password" minlength="6">
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="register-btn">Create Account</button>
        </form>
        <div class="auth-footer">
          <p>Already have an account? <a href="login.html">Sign in here</a></p>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Mithila Crafts. All rights reserved. Made with love for Mithila art.</p>
      </div>
    </div>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (Auth.isLoggedIn()) {
        window.location.href = 'dashboard.html';
        return;
      }

      const form = document.getElementById('register-form');
      const msgEl = document.getElementById('auth-message');
      const registerBtn = document.getElementById('register-btn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        registerBtn.disabled = true;
        registerBtn.textContent = 'Creating account...';
        msgEl.className = 'form-message';
        msgEl.style.display = 'none';

        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        if (password !== confirmPassword) {
          msgEl.textContent = 'Passwords do not match';
          msgEl.className = 'form-message error';
          registerBtn.disabled = false;
          registerBtn.textContent = 'Create Account';
          return;
        }

        try {
          await Auth.register(name, email, password, phone);

          msgEl.textContent = 'Account created! Redirecting...';
          msgEl.className = 'form-message success';

          setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
        } catch (err) {
          msgEl.textContent = err.message;
          msgEl.className = 'form-message error';
          registerBtn.disabled = false;
          registerBtn.textContent = 'Create Account';
        }
      });
    });
  </script>
  
  <script src="/js2/pwa.js"></script>
  <script src="/js2/trending.js"></script>
  <script>window.SM_PAGE_ID = "crafts.register";</script>
  <script src="/js/chatbot.js"></script>
</body>
</html>
