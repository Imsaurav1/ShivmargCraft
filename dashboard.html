<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your Mithila Crafts account dashboard - manage orders and profile.">
  <title>My Account - Mithila Crafts</title>
  <link rel="icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">
        <img src="logo192.png" alt="Mithila Crafts">
        Mithila Crafts
      </a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Shop</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="cart.html" class="nav-cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="cart-badge" style="display:none">0</span>
        </a>
        <span class="auth-nav-links"></span>
      </div>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Dashboard -->
  <section class="dashboard-page">
    <div class="container">
      <div class="dashboard-header">
        <h1>My Account</h1>
        <button class="btn btn-outline btn-sm" id="logout-btn">Logout</button>
      </div>

      <div class="dashboard-tabs">
        <button class="dash-tab active" data-tab="orders">My Orders</button>
        <button class="dash-tab" data-tab="profile">Profile</button>
      </div>

      <!-- Orders Tab -->
      <div class="dash-content" id="tab-orders">
        <div id="orders-loading" class="loading-state">Loading your orders...</div>
        <div id="orders-list"></div>
      </div>

      <!-- Profile Tab -->
      <div class="dash-content" id="tab-profile" style="display:none;">
        <div class="profile-card">
          <h2>Profile Details</h2>
          <div id="profile-message" class="form-message"></div>
          <form id="profile-form">
            <div class="form-row">
              <div class="form-group">
                <label for="p-name">Full Name</label>
                <input type="text" id="p-name" required>
              </div>
              <div class="form-group">
                <label for="p-email">Email</label>
                <input type="email" id="p-email" disabled>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="p-phone">Phone</label>
                <input type="tel" id="p-phone" placeholder="+91 12345 67890">
              </div>
              <div class="form-group">
                <label for="p-role">Account Type</label>
                <input type="text" id="p-role" disabled>
              </div>
            </div>
            <div class="form-group">
              <label for="p-address">Shipping Address</label>
              <textarea id="p-address" rows="3" placeholder="Your default shipping address"></textarea>
            </div>
            <h3 style="margin: 24px 0 16px; font-size: 1.1rem;">Change Password</h3>
            <div class="form-group">
              <label for="p-password">New Password (leave blank to keep current)</label>
              <input type="password" id="p-password" placeholder="Min. 6 characters" minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" id="save-profile-btn">Save Changes</button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Mithila Crafts. All rights reserved. Made with love for Mithila art.</p>
      </div>
    </div>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!Auth.isLoggedIn()) {
        window.location.href = 'login.html?redirect=dashboard.html';
        return;
      }

      // Logout
      document.getElementById('logout-btn').addEventListener('click', () => Auth.logout());

      // Tabs
      document.querySelectorAll('.dash-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.dash-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          document.querySelectorAll('.dash-content').forEach(c => c.style.display = 'none');
          document.getElementById(`tab-${tab.dataset.tab}`).style.display = 'block';
        });
      });

      // Load orders
      loadOrders();
      loadProfile();
    });

    async function loadOrders() {
      const container = document.getElementById('orders-list');
      const loading = document.getElementById('orders-loading');

      try {
        const res = await fetch('/.netlify/functions/orders-api', {
          headers: Auth.authHeaders(),
        });
        const data = await res.json();
        loading.style.display = 'none';

        if (!data.orders || data.orders.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="var(--color-border)" stroke-width="1.5">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>
              </svg>
              <h3>No orders yet</h3>
              <p>Start shopping to see your orders here.</p>
              <a href="products.html" class="btn btn-primary">Browse Products</a>
            </div>
          `;
          return;
        }

        container.innerHTML = data.orders.map(order => {
          const statusColor = {
            pending: '#F9A825', confirmed: '#2196F3', processing: '#FF9800',
            shipped: '#9C27B0', delivered: '#4CAF50', cancelled: '#F44336'
          }[order.status] || '#999';

          const paymentLabel = {
            paid: 'Payment Received',
            awaiting_verification: 'UPI Payment - Awaiting Verification',
            pay_on_delivery: 'Cash on Delivery',
            unpaid: 'Unpaid',
            refunded: 'Refunded',
          }[order.paymentStatus] || '';

          return `
            <div class="order-card">
              <div class="order-header">
                <div>
                  <span class="order-id">${order.id}</span>
                  <span class="order-date">${new Date(order.createdAt).toLocaleDateString('en-IN', { year: 'numeric', month: 'long', day: 'numeric' })}</span>
                </div>
                <span class="order-status" style="background: ${statusColor}20; color: ${statusColor}; border: 1px solid ${statusColor}40;">
                  ${order.status.charAt(0).toUpperCase() + order.status.slice(1)}
                </span>
              </div>
              ${paymentLabel ? `<p style="font-size:0.8rem;color:var(--color-text-light);margin-bottom:8px;">${paymentLabel}</p>` : ''}
              <div class="order-items">
                ${order.items.map(item => `
                  <div class="order-item-row">
                    <span>${item.name} x ${item.qty}</span>
                    <span>&#8377;${(item.price * item.qty).toLocaleString('en-IN')}</span>
                  </div>
                `).join('')}
              </div>
              <div class="order-total">
                <span>Total</span>
                <span>&#8377;${order.total.toLocaleString('en-IN')}</span>
              </div>
            </div>
          `;
        }).join('');
      } catch (err) {
        loading.style.display = 'none';
        container.innerHTML = '<p class="error-text">Failed to load orders. Please try again.</p>';
      }
    }

    async function loadProfile() {
      try {
        const user = await Auth.getProfile();
        document.getElementById('p-name').value = user.name || '';
        document.getElementById('p-email').value = user.email || '';
        document.getElementById('p-phone').value = user.phone || '';
        document.getElementById('p-role').value = user.role === 'admin' ? 'Administrator' : 'Customer';
        document.getElementById('p-address').value = user.address || '';
      } catch (err) {
        console.error('Profile load error:', err);
      }

      const form = document.getElementById('profile-form');
      const msgEl = document.getElementById('profile-message');
      const saveBtn = document.getElementById('save-profile-btn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving...';
        msgEl.className = 'form-message';
        msgEl.style.display = 'none';

        try {
          const updates = {
            name: document.getElementById('p-name').value,
            phone: document.getElementById('p-phone').value,
            address: document.getElementById('p-address').value,
          };
          const pw = document.getElementById('p-password').value;
          if (pw) updates.password = pw;

          await Auth.updateProfile(updates);
          msgEl.textContent = 'Profile updated successfully!';
          msgEl.className = 'form-message success';
          document.getElementById('p-password').value = '';
        } catch (err) {
          msgEl.textContent = err.message;
          msgEl.className = 'form-message error';
        }

        saveBtn.disabled = false;
        saveBtn.textContent = 'Save Changes';
      });
    }
  </script>
  
  <script src="/js2/pwa.js"></script>
  <script src="/js2/trending.js"></script>
  <script>window.SM_PAGE_ID = "crafts.dashboard";</script>
  <script src="/js/chatbot.js"></script>
</body>
</html>
