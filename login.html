<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to your Mithila Crafts account to manage orders and track your purchases.">
  <title>Login - Mithila Crafts</title>
  <link rel="icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">
        <img src="logo192.png" alt="Mithila Crafts">
        Mithila Crafts
      </a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Shop</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="cart.html" class="nav-cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="cart-badge" style="display:none">0</span>
        </a>
        <span class="auth-nav-links"></span>
      </div>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Login Form -->
  <section class="auth-page">
    <div class="container">
      <div class="auth-card">
        <div class="auth-header">
          <h1>Welcome Back</h1>
          <p>Sign in to your Mithila Crafts account</p>
        </div>
        <div id="auth-message" class="form-message"></div>
        <form id="login-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required placeholder="your@email.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="Enter your password" autocomplete="current-password" minlength="6">
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="login-btn">Sign In</button>
        </form>
        <div class="auth-footer">
          <p>Don't have an account? <a href="register.html">Create one here</a></p>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Mithila Crafts. All rights reserved. Made with love for Mithila art.</p>
      </div>
    </div>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Redirect if already logged in
      if (Auth.isLoggedIn()) {
        window.location.href = 'dashboard.html';
        return;
      }

      const form = document.getElementById('login-form');
      const msgEl = document.getElementById('auth-message');
      const loginBtn = document.getElementById('login-btn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        loginBtn.disabled = true;
        loginBtn.textContent = 'Signing in...';
        msgEl.className = 'form-message';
        msgEl.style.display = 'none';

        try {
          const email = document.getElementById('email').value;
          const password = document.getElementById('password').value;
          await Auth.login(email, password);

          msgEl.textContent = 'Login successful! Redirecting...';
          msgEl.className = 'form-message success';

          // Redirect to dashboard or previous page
          const redirect = new URLSearchParams(window.location.search).get('redirect') || 'dashboard.html';
          setTimeout(() => { window.location.href = redirect; }, 500);
        } catch (err) {
          msgEl.textContent = err.message;
          msgEl.className = 'form-message error';
          loginBtn.disabled = false;
          loginBtn.textContent = 'Sign In';
        }
      });
    });
  </script>
  
  <script src="/js2/pwa.js"></script>
  <script src="/js2/trending.js"></script>
  <script>window.SM_PAGE_ID = "crafts.login";</script>
  <script src="/js/chatbot.js"></script>
</body>
</html>
